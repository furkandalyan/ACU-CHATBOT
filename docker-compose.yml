version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: acibadem_postgres
    environment:
      POSTGRES_DB: acibadem_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    container_name: acibadem_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  web:
    build: .
    container_name: acibadem_web
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_NAME=acibadem_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres123
      - DB_PORT=5432
      - OLLAMA_URL=http://ollama:11434

volumes:
  postgres_data:
  ollama_data: